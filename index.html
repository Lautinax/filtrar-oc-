<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buscador Unificado VA05 - Control de OCs</title>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 12px;
            background-color: #f0f4f8;
            color: #333;
            font-size: 13px;
        }
        .container {
            max-width: 100%;
            margin: auto;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h2 {
            margin: 0 0 12px 0;
            color: #1e293b;
            font-size: 18px;
            border-bottom: 2px solid #cbd5e1;
            padding-bottom: 6px;
        }
        .drop-zone {
            border: 2px dashed #2563eb;
            padding: 20px;
            text-align: center;
            background: #eff6ff;
            cursor: pointer;
            border-radius: 6px;
            font-weight: 500;
            color: #2563eb;
            margin-bottom: 12px;
            transition: all 0.2s ease;
        }
        .drop-zone.hover { background: #dbeafe; border-color: #1d4ed8; }
        .drop-zone.loaded { background: #ecfdf5; border-color: #10b981; color: #047857; padding: 10px; }
        
        .seccion-filtros {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 15px;
            background: #f8fafc;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #e2e8f0;
            margin-bottom: 12px;
        }
        .grupo-input {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        label {
            font-weight: 600;
            color: #475569;
        }
        .input-control {
            padding: 6px 10px;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
            font-size: 12px;
            box-sizing: border-box;
        }
        textarea.input-control {
            height: 38px;
            resize: none;
        }
        
        #workspace {
            display: none;
        }
        .panel-tabla {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 6px;
            padding: 10px;
        }
        .header-tabla {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        .indicador-resultados {
            font-weight: bold;
            color: #0f172a;
        }
        .acciones {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .select-status {
            padding: 5px 10px;
            border-radius: 4px;
            border: 1px solid #cbd5e1;
            background-color: white;
            font-size: 11px;
            font-weight: 600;
            color: #334155;
            cursor: pointer;
        }
        .btn-excel {
            background-color: #16a34a;
            color: white;
            border: none;
            padding: 5px 14px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .btn-excel:hover { background-color: #15803d; }

        .tabla-contenedor {
            max-height: 480px;
            overflow-y: auto;
            border: 1px solid #cbd5e1;
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 11px;
        }
        th, td {
            border: 1px solid #cbd5e1;
            padding: 5px 6px;
            text-align: center;
        }
        th {
            background: #f1f5f9;
            color: #1e293b;
            position: sticky;
            top: 0;
            z-index: 5;
        }
        tr:hover { background-color: #f8fafc; }
        .status-concluido { background-color: #ecfdf5; color: #065f46; font-weight: 500; }
        .status-pendiente { background-color: #fff7ed; color: #9a3412; font-weight: 500; }
        .status-no-cargado { background-color: #fef2f2; color: #991b1b; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h2>🔍 Verificador de Órdenes de Compra (Reporte VA05 SAP)</h2>
    
    <div id="dropZone" class="drop-zone">
        Arrastrá y soltá el reporte Excel o CSV exportado de la VA05 acá
    </div>
    <input type="file" id="fileInput" accept=".xlsx, .xls, .csv" style="display: none;">

    <div id="workspace">
        <div class="seccion-filtros">
            <div class="grupo-input">
                <label for="txtCliente">Filtrar por Nombre de Cliente:</label>
                <input type="text" id="txtCliente" class="input-control" placeholder="Ej: ARCOR">
            </div>
            <div class="grupo-input">
                <label for="txtOCs">Control Masivo de OC (Pegá varias separadas por coma o renglón):</label>
                <textarea id="txtOCs" class="input-control" placeholder="Ej: 10730991 OS, 52777328 6A"></textarea>
            </div>
        </div>

        <div class="panel-tabla">
            <div class="header-tabla">
                <div id="resumenContadores" class="indicador-resultados">Mostrando registros...</div>
                <div class="acciones">
                    <label style="font-size: 11px;">Filtrar Estatus:</label>
                    <select id="selectStatus" class="select-status" onchange="filtrarYRenderizar()">
                        <option value="TODOS">📊 Todos los registros</option>
                        <option value="PENDIENTE">⏳ Solo Pendientes</option>
                        <option value="CONCLUIDO">✅ Solo Concluidos</option>
                        <option value="NO_CARGADO">❌ Solo No Cargados (Faltantes)</option>
                    </select>
                    <button class="btn-excel" onclick="exportarExcel()">📥 Exportar reporte Excel</button>
                </div>
            </div>
            
            <div class="tabla-contenedor">
                <table id="tablaResultados">
                    <thead>
                        <tr>
                            <th>Referencia Cliente (OC)</th>
                            <th>Documento Ventas</th>
                            <th>Solicitante / Cliente</th>
                            <th>Descripción Material</th>
                            <th>Cant. Pedido (Pos)</th>
                            <th>Status Entrega</th>
                        </tr>
                    </thead>
                    <tbody id="tbodyResultados"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const txtCliente = document.getElementById('txtCliente');
    const txtOCs = document.getElementById('txtOCs');
    const selectStatus = document.getElementById('selectStatus');
    const tbodyResultados = document.getElementById('tbodyResultados');
    const resumenContadores = document.getElementById('resumenContadores');

    let datosGlobales = [];

    dropZone.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', (e) => { if(e.target.files.length > 0) procesarArchivo(e.target.files[0]); });
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('hover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('hover'));
    dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('hover');
        if(e.dataTransfer.files.length > 0) procesarArchivo(e.dataTransfer.files[0]);
    });

    txtCliente.addEventListener('input', filtrarYRenderizar);
    txtOCs.addEventListener('input', filtrarYRenderizar);

    function procesarArchivo(file) {
        const reader = new FileReader();
        reader.onload = function(e) {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const primeraHoja = workbook.SheetNames[0];
            const sheet = workbook.Sheets[primeraHoja];
            
            const filasRaw = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
            
            let headerRowIndex = -1;
            let headers = [];
            
            for (let i = 0; i < filasRaw.length; i++) {
                if (filasRaw[i] && filasRaw[i].map(c => String(c).trim().toLowerCase()).includes("documento de ventas")) {
                    headerRowIndex = i;
                    headers = filasRaw[i].map(h => String(h || '').trim());
                    break;
                }
            }
            
            if (headerRowIndex === -1) {
                alert("❌ Error: No se encontró la columna 'Documento de ventas'. Verifique que sea un reporte de la VA05.");
                return;
            }

            datosGlobales = [];
            
            const idxDoc = headers.findIndex(h => h.toLowerCase() === "documento de ventas");
            const idxRef = headers.findIndex(h => h.toLowerCase() === "referencia de cliente");
            const idxNom = headers.findIndex(h => h.toLowerCase() === "nombre del solicitante");
            const idxMat = headers.findIndex(h => h.toLowerCase() === "descripción del material");
            const idxCant = headers.findIndex(h => h.toLowerCase() === "cantidad de pedido (posición)");
            const idxStatus = headers.findIndex(h => h.toLowerCase() === "descripción posición de status entrega");

            for (let i = headerRowIndex + 1; i < filasRaw.length; i++) {
                let fila = filasRaw[i];
                if (!fila || fila.length === 0 || !fila[idxDoc]) continue;

                datosGlobales.push({
                    docVentas: String(fila[idxDoc]).trim(),
                    referencia: String(fila[idxRef] || '').trim(),
                    nombre: String(fila[idxNom] || '').trim(),
                    material: String(fila[idxMat] || '').trim(),
                    cantidad: parseInt(fila[idxCant]) || 0,
                    status: String(fila[idxStatus] || '').trim()
                });
            }

            dropZone.classList.add('loaded');
            dropZone.innerHTML = `✅ Reporte VA05 cargado con éxito (${datosGlobales.length} posiciones analizadas).`;
            document.getElementById('workspace').style.display = 'block';
            
            filtrarYRenderizar();
        };
        reader.readAsArrayBuffer(file);
    }

    function obtenerFiltrosOC() {
        const rawText = txtOCs.value;
        if (!rawText.trim()) return [];
        return rawText.split(/[\n,;\t]+/).map(oc => oc.trim().toLowerCase()).filter(oc => oc.length > 0);
    }

    function filtrarYRenderizar() {
        if (!datosGlobales.length) return;

        const filtroCliente = txtCliente.value.toLowerCase().trim();
        const filtrosOC = obtenerFiltrosOC();
        const filtroEstatusSel = selectStatus.value;

        let registrosFiltrados = [];
        let ocsNoEncontradas = [...filtrosOC];

        if (filtrosOC.length > 0) {
            datosGlobales.forEach(reg => {
                const regOc = reg.referencia.toLowerCase();
                const matchOc = filtrosOC.some(f => regOc.includes(f));
                
                if (matchOc) {
                    if (!filtroCliente || reg.nombre.toLowerCase().includes(filtroCliente)) {
                        registrosFiltrados.push(reg);
                        ocsNoEncontradas = ocsNoEncontradas.filter(f => !regOc.includes(f));
                    }
                }
            });
        } else {
            registrosFiltrados = datosGlobales.filter(reg => {
                return !filtroCliente || reg.nombre.toLowerCase().includes(filtroCliente);
            });
        }

        // Aplicar el Filtro por Estatus secundario
        if (filtroEstatusSel !== "TODOS") {
            if (filtroEstatusSel === "CONCLUIDO") {
                registrosFiltrados = registrosFiltrados.filter(r => r.status.toLowerCase().includes('concluido'));
                ocsNoEncontradas = []; // En este filtro no aplican los no cargados
            } else if (filtroEstatusSel === "PENDIENTE") {
                registrosFiltrados = registrosFiltrados.filter(r => !r.status.toLowerCase().includes('concluido'));
                ocsNoEncontradas = []; 
            } else if (filtroEstatusSel === "NO_CARGADO") {
                registrosFiltrados = []; // Solo queremos ver las ocsNoEncontradas
            }
        }

        let html = "";
        
        // Renderizar bloque de NO CARGADOS (Si aplica)
        if (filtroEstatusSel === "TODOS" || filtroEstatusSel === "NO_CARGADO") {
            ocsNoEncontradas.forEach(oc => {
                html += `<tr class="fila-tabla-datos">
                            <td class="status-no-cargado">${oc.toUpperCase()}</td>
                            <td class="status-no-cargado">❌ NO CARGADO</td>
                            <td colspan="4" style="color:#991b1b; text-align:left; font-weight:500;">Pedido sin registrar en el sistema.</td>
                         </tr>`;
            });
        }

        // Renderizar registros reales encontradas
        registrosFiltrados.forEach(r => {
            let claseStatus = r.status.toLowerCase().includes('concluido') ? 'status-concluido' : 'status-pendiente';
            html += `<tr class="fila-tabla-datos">
                        <td><b>${r.referencia || '-'}</b></td>
                        <td>${r.docVentas}</td>
                        <td style="text-align:left;">${r.nombre}</td>
                        <td style="text-align:left;">${r.material}</td>
                        <td>${r.cantidad}</td>
                        <td class="${claseStatus}">${r.status || 'Pendiente'}</td>
                     </tr>`;
        });

        tbodyResultados.innerHTML = html;
        
        let conteoVisibles = registrosFiltrados.length + ocsNoEncontradas.length;
        resumenContadores.textContent = `Resultados: ${conteoVisibles} posiciones en vista actual.` + 
            (filtrosOC.length > 0 && filtroEstatusSel === "TODOS" ? ` (${ocsNoEncontradas.length} faltantes sin cargar).` : '');
    }

    function exportarExcel() {
        const filas = tbodyResultados.querySelectorAll('tr.fila-tabla-datos');
        if (!filas.length) {
            alert("No hay datos en la tabla para exportar.");
            return;
        }

        // Creamos la estructura limpia para la hoja de cálculo
        const matrizExcel = [
            ["Referencia Cliente (OC)", "Documento Ventas", "Solicitante / Cliente", "Descripción Material", "Cant. Pedido", "Status Entrega"]
        ];

        filas.forEach(f => {
            const c = f.querySelectorAll('td');
            if (c.length === 3) {
                // Caso No Cargado
                matrizExcel.push([c[0].textContent, "❌ NO CARGADO", "-", "-", "-", "Falta ingresar a SAP"]);
            } else if (c.length >= 6) {
                matrizExcel.push([c[0].textContent, c[1].textContent, c[2].textContent, c[3].textContent, parseInt(c[4].textContent) || 0, c[5].textContent]);
            }
        });

        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(matrizExcel);
        XLSX.utils.book_append_sheet(wb, ws, "Control_OC_VA05");
        
        // Descarga
        XLSX.writeFile(wb, "Control_Cumplimiento_OCs.xlsx");
    }
</script>

</body>
</html>
